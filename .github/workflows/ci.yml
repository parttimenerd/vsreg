name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  unit:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m unittest test_vsreg -v

  vscode-harness:
    name: VSCode harness tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Playwright
        run: |
          pip install playwright
          python -m playwright install chromium --with-deps

      - name: Install VS Code CLI
        run: |
          curl -fsSL "https://code.visualstudio.com/sha/download?build=stable&os=cli-alpine-x64" \
            -o /tmp/vscode-cli.tar.gz
          tar -xzf /tmp/vscode-cli.tar.gz -C /usr/local/bin
          code --version

      - name: Install Java (for JAVA_BIN resolution)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Run VSCode harness tests
        run: python -m unittest test_vscode_harness -v
        timeout-minutes: 10
